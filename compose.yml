services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-secure_lab}
      POSTGRES_USER: ${POSTGRES_USER:-secure_lab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_lab_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-local-development-only-change-me}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
      UPLOAD_DIR: /app/data/uploads
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-secure_lab}:${POSTGRES_PASSWORD:-secure_lab_dev}@db:5432/${POSTGRES_DB:-secure_lab}
    command:
      - sh
      - -c
      - alembic upgrade head && uvicorn secure_coding_lab.main:app --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - frontend
      - backend
    expose:
      - "8000"
    read_only: true
    volumes:
      - product_images:/app/data/uploads
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  frontend:
  backend:
    internal: true

volumes:
  postgres_data:
  product_images:
