{% extends "base.html" %}
{% block content %}
  <section class="settings-panel">
    <p class="eyebrow">ADMIN · AUDIT</p>
    <h1>감사 로그</h1>
    {% for log, admin_user in logs %}
      <article class="settings-card">
        <h2>{{ log.action }}</h2>
        <p>관리자: {{ admin_user.username }}</p>
        <p class="bio">{{ log.reason }}</p>
        <time datetime="{{ log.created_at.isoformat() }}">
          {{ log.created_at.strftime("%Y-%m-%d %H:%M") }}
        </time>
      </article>
    {% else %}
      <p class="empty-state">감사 로그가 없습니다.</p>
    {% endfor %}
  </section>
{% endblock %}
