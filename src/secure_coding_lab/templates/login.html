{% extends "base.html" %}

{% block content %}
  <section class="form-panel">
    <p class="eyebrow">WELCOME BACK</p>
    <h1>로그인</h1>
    {% if notice %}<p class="message message--ok" role="status">{{ notice }}</p>{% endif %}
    {% if error %}<p class="message message--error" role="alert">{{ error }}</p>{% endif %}
    <form method="post" action="/login">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <label for="username">아이디</label>
      <input
        id="username"
        name="username"
        value="{{ username|default('') }}"
        maxlength="32"
        autocomplete="username"
        required
      >
      <label for="password">비밀번호</label>
      <input
        id="password"
        name="password"
        type="password"
        maxlength="128"
        autocomplete="current-password"
        required
      >
      <button type="submit">로그인</button>
    </form>
  </section>
{% endblock %}
