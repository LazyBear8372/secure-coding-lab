{% extends "base.html" %}

{% block content %}
  <section class="form-panel">
    <p class="eyebrow">CREATE ACCOUNT</p>
    <h1>회원가입</h1>
    <p>아이디와 안전한 비밀번호로 계정을 만드세요.</p>
    {% if error %}<p class="message message--error" role="alert">{{ error }}</p>{% endif %}
    <form method="post" action="/signup">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <label for="username">아이디</label>
      <input
        id="username"
        name="username"
        value="{{ username|default('') }}"
        minlength="3"
        maxlength="32"
        pattern="[a-z0-9_]+"
        autocomplete="username"
        required
      >
      <label for="password">비밀번호</label>
      <input
        id="password"
        name="password"
        type="password"
        minlength="12"
        maxlength="128"
        autocomplete="new-password"
        required
      >
      <label for="password-confirm">비밀번호 확인</label>
      <input
        id="password-confirm"
        name="password_confirm"
        type="password"
        minlength="12"
        maxlength="128"
        autocomplete="new-password"
        required
      >
      <button type="submit">가입하기</button>
    </form>
  </section>
{% endblock %}
